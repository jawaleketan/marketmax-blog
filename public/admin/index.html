<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarketMax — Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    html { background: #0d0d0f; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    :root {
      --accent: #f59e0b;
      --bg-base: #070708;
      --bg-surface: #0d0d0f;
      --bg-card: #111113;
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1aa;
      --border: #1c1c20;
    }
  </style>
  <style>
    .preview-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .preview-card .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      font-size: 0.625rem;
      font-family: ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 1px solid;
    }
    .preview-card .tag.seo { color: #10b981; border-color: rgba(16,185,129,0.25); background: rgba(16,185,129,0.05); }
    .preview-card .tag.social-media { color: #8b5cf6; border-color: rgba(139,92,246,0.25); background: rgba(139,92,246,0.05); }
    .preview-card .tag.content-marketing { color: #f59e0b; border-color: rgba(245,158,11,0.25); background: rgba(245,158,11,0.05); }
    .preview-card .tag.ppc { color: #3b82f6; border-color: rgba(59,130,246,0.25); background: rgba(59,130,246,0.05); }
    .preview-card .tag.analytics { color: #ec4899; border-color: rgba(236,72,153,0.25); background: rgba(236,72,153,0.05); }
    .preview-card .dot { width: 0.25rem; height: 0.25rem; border-radius: 50%; background: currentColor; }
    .preview-card .meta { font-size: 0.6875rem; font-family: ui-monospace, monospace; color: #6b6b77; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      netlifyIdentity.on("init", function(user) {
        if (!user) {
          netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }

    CMS.registerPreviewStyle("/admin/preview.css", { raw: false });
    CMS.registerPreviewTemplate("blog", function({ entry }) {
      var data = entry.get("data");
      if (!data) return "<div>Loading...</div>";

      var cat = data.get("category") || "";
      var catLabel = { seo: "SEO", "social-media": "Social", "content-marketing": "Content", ppc: "PPC", analytics: "Analytics" }[cat] || cat;
      var date = data.get("publishDate");
      var formatted = date ? new Date(date).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "";
      var tags = (data.get("tags") || []).toArray ? data.get("tags").toArray() : data.get("tags") || [];

      return (
        "<div class='preview-card'>" +
          "<div style='display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem'>" +
            "<span class='tag " + cat + "'><span class='dot'></span>" + catLabel + "</span>" +
            "<span class='meta'>" + formatted + "</span>" +
          "</div>" +
          "<h2 style='font-size:1.125rem;font-weight:700;color:" + (data.get("featured") ? "#f59e0b" : "#f5f5f7") + ";line-height:1.3;margin:0 0 0.5rem'>" + data.get("title") + "</h2>" +
          "<p style='font-size:0.875rem;color:#a1a1aa;line-height:1.6;margin:0 0 0.75rem'>" + data.get("description") + "</p>" +
          "<div style='display:flex;gap:0.375rem;flex-wrap:wrap'>" +
            tags.map(function(t) { return "<span style='font-size:0.625rem;font-family:monospace;color:#6b6b77;background:#18181b;padding:0.125rem 0.375rem;border-radius:4px;border:1px solid #1c1c20'>#" + t + "</span>"; }).join("") +
          "</div>" +
        "</div>"
      );
    });
  </script>
</body>
</html>
